<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאקרו 2 — משחק לימוד</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap');

  :root {
    --bg: #0d0f1a;
    --surface: #131628;
    --surface2: #1a1f35;
    --border: #252b45;
    --accent: #4f7cff;
    --accent2: #7c4fff;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --text: #e8eaf6;
    --muted: #6b7498;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .score-bar span { color: var(--text); font-weight: 700; font-size: 1.1rem; }

  /* MODE SELECTOR */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-tab {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .mode-tab.active, .mode-tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* MAIN CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 680px;
    position: relative;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .category-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
  }

  /* MCQ OPTIONS */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    padding: 14px 20px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    text-align: right;
    transition: all 0.18s;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #1e2540;
  }
  .option-btn.correct { border-color: var(--green); background: #0d2b1a; color: var(--green); }
  .option-btn.wrong   { border-color: var(--red);   background: #2b0d0d; color: var(--red); }
  .option-btn.reveal  { border-color: var(--green); background: #0d2b1a; color: var(--green); }

  /* FEEDBACK */
  .feedback {
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.95rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #0d2b1a; border: 1px solid var(--green); color: #7effc5; }
  .feedback.wrong-fb   { background: #2b0d0d; border: 1px solid var(--red);   color: #ffa7a7; }

  /* FLASHCARD */
  .flashcard-wrapper {
    perspective: 1000px;
    width: 100%;
    height: 220px;
    cursor: pointer;
  }
  .flashcard-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .flashcard-inner.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    font-size: 1.15rem;
    line-height: 1.6;
  }
  .flashcard-front {
    background: linear-gradient(135deg, #1a2240, #1e1a3a);
    border: 1.5px solid var(--accent);
    font-weight: 700;
    font-size: 1.4rem;
    color: #a8bcff;
  }
  .flashcard-back {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    transform: rotateY(180deg);
    font-size: 0.95rem;
    color: var(--text);
  }
  .flip-hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 8px;
  }

  /* MATCHING */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .match-col { display: flex; flex-direction: column; gap: 8px; }
  .match-item {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 0.88rem;
    line-height: 1.4;
    transition: all 0.18s;
    min-height: 52px;
    display: flex;
    align-items: center;
  }
  .match-item:hover:not(.matched):not(.selected) {
    border-color: var(--accent);
  }
  .match-item.selected { border-color: var(--accent2); background: #1a133a; }
  .match-item.matched  { border-color: var(--green);   background: #0d2b1a; color: #7effc5; }
  .match-item.wrong-match { border-color: var(--red); background: #2b0d0d; }
  .match-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-align: center;
  }

  /* NEXT BTN */
  .next-btn {
    padding: 13px 30px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    align-self: flex-end;
    display: none;
  }
  .next-btn:hover { opacity: 0.85; }
  .next-btn.show { display: block; }

  /* PROGRESS */
  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s;
  }
  .progress-txt { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

  /* RESULTS */
  .results-card {
    text-align: center;
    gap: 16px;
  }
  .results-card h2 {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .results-card .big-score {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--green);
  }
  .restart-btn {
    padding: 13px 30px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CATEGORY COLOR CHIPS */
  .cat-1 { background: #1a2a4a; color: #7aaaf0; }
  .cat-2 { background: #2a1a3a; color: #b07af0; }
  .cat-3 { background: #1a2a2a; color: #7af0d8; }
  .cat-4 { background: #2a2a1a; color: #f0d87a; }
</style>
</head>
<body>

<header>
  <h1>מאקרו 2 — מבחן קרוב 📈</h1>
  <p>למד את המושגים עם 3 מצבי משחק שונים</p>
</header>

<div class="score-bar">
  <div>ניקוד: <span id="score">0</span></div>
  <div>רצף: <span id="streak">0</span> 🔥</div>
  <div>נכון: <span id="correct-count">0</span></div>
  <div>שאלה: <span id="q-num">1</span></div>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('mcq')">🎯 בחירה מרובה</button>
  <button class="mode-tab" onclick="setMode('flash')">🃏 כרטיסיות</button>
  <button class="mode-tab" onclick="setMode('match')">🔗 התאמה</button>
</div>

<div class="card" id="main-card">
  <!-- dynamic content injected here -->
</div>

// ─── MATCHING PAIRS DATA ───────────────────────────────────────────
const MATCH_SETS = [
  [
    { term: "הפרדה שלילית", def: "בעיית מידע לפני עסקה — נשארים רק הלווים הגרועים בשוק" },

    { term: "השפעת הרכוש על התצרוכת", def: "מחירי נכסים ↑ → צרכנים מרגישים עשירים → תצרוכת ↑" },
    { term: "ערוץ שער החליפין הריאלי", def: "ריבית ↓ → פיחות → יצוא מוזל לזרים → מאזן סחר משתפר → תוצר ↑" }

// ─── STATE ─────────────────────────────────────────────────────────
let mode = 'mcq';
let score = 0, streak = 0, correctCount = 0, totalAnswered = 0;
let shuffled = [], qIdx = 0;
let flashIdx = 0, flashShuffled = [];
let matchSetIdx = 0, matchSelected = null, matchMatched = 0;

function updateScoreBar() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('q-num').textContent = totalAnswered + 1;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['mcq','flash','match'][i] === m);
  });
  // reset per-mode
  if (m === 'mcq') startMCQ();
  if (m === 'flash') startFlash();
  if (m === 'match') startMatch();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// ─── MCQ MODE ──────────────────────────────────────────────────────
function startMCQ() {
  shuffled = shuffle(TERMS);
  qIdx = 0;
  renderMCQ();
}

function renderMCQ() {
  if (qIdx >= shuffled.length) { showResults(); return; }
  const q = shuffled[qIdx];
  const wrong = shuffle(q.distractors).slice(0, 3);
  const options = shuffle([q.def, ...wrong]);
  const progress = ((qIdx / shuffled.length) * 100).toFixed(0);

  document.getElementById('main-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="category-badge ${q.catClass}">${q.category}</span>
      <span style="font-size:0.8rem;color:var(--muted)">שאלה ${qIdx+1}/${shuffled.length}</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span class="progress-txt">${progress}%</span>
    </div>
    <div class="question-text">מה ההסבר הנכון למושג:<br><strong style="color:#a8bcff">${q.term}</strong>?</div>
    <div class="options-grid" id="opts">
      ${options.map((o,i) => `<button class="option-btn" onclick="checkMCQ(this,'${o === q.def}')">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="nextMCQ()">שאלה הבאה ←</button>
  `;
  updateScoreBar();
}

function checkMCQ(btn, isCorrect) {
  const opts = document.querySelectorAll('.option-btn');
  opts.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  const nxt = document.getElementById('nxt');

  totalAnswered++;
  if (isCorrect === 'true') {
    btn.classList.add('correct');
    score += 10 + (streak * 2);
    streak++; correctCount++;
    fb.className = 'feedback correct-fb show';
    fb.textContent = `✅ נכון! ${streak > 2 ? '🔥 רצף של ' + streak + '!' : ''}`;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    // highlight correct
    const q = shuffled[qIdx];
    opts.forEach(b => { if (b.textContent.trim() === q.def) b.classList.add('reveal'); });
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ לא נכון. <strong>התשובה הנכונה:</strong> ${q.def}`;
  }
  nxt.classList.add('show');
  updateScoreBar();
}

function nextMCQ() { qIdx++; renderMCQ(); }

// ─── FLASHCARD MODE ─────────────────────────────────────────────────
function startFlash() {
  flashShuffled = shuffle(TERMS);
  flashIdx = 0;
  renderFlash();
}

function renderFlash() {
  if (flashIdx >= flashShuffled.length) { showResults(); return; }
  const q = flashShuffled[flashIdx];
  document.getElementById('main-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="category-badge ${q.catClass}">${q.category}</span>
      <span style="font-size:0.8rem;color:var(--muted)">${flashIdx+1}/${flashShuffled.length}</span>
    </div>
    <div class="flashcard-wrapper" onclick="flipCard()">
      <div class="flashcard-inner" id="fc">
        <div class="flashcard-face flashcard-front">${q.term}</div>
        <div class="flashcard-face flashcard-back">${q.def}</div>
      </div>
    </div>
    <p class="flip-hint">👆 לחץ על הכרטיסייה להפיכה</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;">
      <button onclick="flashAnswer(false)" style="padding:10px 22px;border-radius:8px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-family:Heebo,sans-serif;font-size:0.9rem;cursor:pointer;">😕 לא ידעתי</button>
      <button onclick="flashAnswer(true)"  style="padding:10px 22px;border-radius:8px;border:1.5px solid var(--green);background:transparent;color:var(--green);font-family:Heebo,sans-serif;font-size:0.9rem;cursor:pointer;">✅ ידעתי!</button>
    </div>
  `;
  updateScoreBar();
}

function flipCard() {
  document.getElementById('fc').classList.toggle('flipped');
}

function flashAnswer(knew) {
  totalAnswered++;
  if (knew) { score += 10; streak++; correctCount++; }
  else { streak = 0; }
  flashIdx++;
  updateScoreBar();
  renderFlash();
}

// ─── MATCHING MODE ─────────────────────────────────────────────────
function startMatch() {
  matchSetIdx = Math.floor(Math.random() * MATCH_SETS.length);
  matchSelected = null; matchMatched = 0;
  renderMatch();
}

function renderMatch() {
  const set = MATCH_SETS[matchSetIdx];
  const terms = shuffle(set.map(x => x.term));
  const defs  = shuffle(set.map(x => x.def));
  const lookup = {};
  set.forEach(x => { lookup[x.term] = x.def; lookup[x.def] = x.term; });

  window._matchLookup = lookup;
  window._matchSet    = set;

  document.getElementById('main-card').innerHTML = `
    <div class="question-text" style="font-size:1rem;">🔗 חבר כל מושג להגדרה הנכונה שלו</div>
    <p style="color:var(--muted);font-size:0.82rem;">לחץ מושג ← לחץ הגדרה תואמת</p>
    <div class="match-grid">
      <div>
        <div class="match-label">מושגים</div>
        <div class="match-col" id="terms-col">
          ${terms.map(t => `<div class="match-item" id="mi-${CSS.escape(t)}" onclick="matchClick(this,'${encodeURIComponent(t)}','term')">${t}</div>`).join('')}
        </div>
      </div>
      <div>
        <div class="match-label">הגדרות</div>
        <div class="match-col" id="defs-col">
          ${defs.map(d => `<div class="match-item" id="mi-${CSS.escape(d)}" onclick="matchClick(this,'${encodeURIComponent(d)}','def')">${d}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="feedback" id="match-fb"></div>
    <button class="next-btn" id="match-nxt" onclick="nextMatch()">סט הבא ←</button>
  `;
}

function matchClick(el, encodedVal, side) {
  if (el.classList.contains('matched')) return;
  const val = decodeURIComponent(encodedVal);

  if (!matchSelected) {
    document.querySelectorAll('.match-item.selected').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    matchSelected = { el, val, side };
    return;
  }

  // Need one term + one def
  if (matchSelected.side === side) {
    document.querySelectorAll('.match-item.selected').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    matchSelected = { el, val, side };
    return;
  }

  const termVal = side === 'def' ? matchSelected.val : val;
  const defVal  = side === 'def' ? val : matchSelected.val;
  const correct = window._matchLookup[termVal] === defVal;

  if (correct) {
    matchSelected.el.classList.remove('selected');
    matchSelected.el.classList.add('matched');
    el.classList.add('matched');
    matchMatched++;
    score += 15; streak++; correctCount++;
    totalAnswered++;
    if (matchMatched === window._matchSet.length) {
      document.getElementById('match-fb').className = 'feedback correct-fb show';
      document.getElementById('match-fb').textContent = '🎉 כל ההתאמות נכונות! מעולה!';
      document.getElementById('match-nxt').classList.add('show');
    }
  } else {
    streak = 0; totalAnswered++;
    matchSelected.el.classList.remove('selected');
    matchSelected.el.classList.add('wrong-match');
    el.classList.add('wrong-match');
    setTimeout(() => {
      matchSelected.el.classList.remove('wrong-match');
      el.classList.remove('wrong-match');
    }, 700);
  }

  matchSelected = null;
  updateScoreBar();
}

function nextMatch() {
  matchSetIdx = (matchSetIdx + 1) % MATCH_SETS.length;
  matchSelected = null; matchMatched = 0;
  renderMatch();
}

// ─── RESULTS ────────────────────────────────────────────────────────
function showResults() {
  const pct = Math.round((correctCount / totalAnswered) * 100) || 0;
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '📈' : '💪';
  let msg   = pct >= 80 ? 'מוכן למבחן!' : pct >= 60 ? 'כמעט שם, עוד קצת!' : 'המשך לתרגל!';

  document.getElementById('main-card').innerHTML = `
    <div class="results-card" style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0;">
      <div style="font-size:3rem;">${emoji}</div>
      <h2>סיימת את הסט!</h2>
      <div class="big-score">${pct}%</div>
      <div style="color:var(--muted)">${msg}</div>
      <div style="color:var(--muted);font-size:0.9rem;">ניקוד: ${score} | נכון: ${correctCount}/${totalAnswered}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="restart-btn" onclick="setMode('mcq')">🎯 בחירה מרובה מחדש</button>
        <button class="restart-btn" onclick="setMode('flash')">🃏 כרטיסיות מחדש</button>
        <button class="restart-btn" onclick="setMode('match')">🔗 התאמה מחדש</button>
      </div>
    </div>
  `;
}

// ─── INIT ────────────────────────────────────────────────────────────
startMCQ();
</script>
</body>
</html>
